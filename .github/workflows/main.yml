name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify other.m3u exists
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          if [ ! -f "$OTHER_M3U" ]; then
            echo "❌ $OTHER_M3U not found — aborting"
            exit 1
          fi
          echo "✅ $OTHER_M3U located."

      - name: Normalize other.m3u
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' "$OTHER_M3U"
          dos2unix "$OTHER_M3U" 2>/dev/null || sed -i 's/\r$//' "$OTHER_M3U"
          sed -i 's/[ \t]*$//' "$OTHER_M3U"

      - name: Download and normalize vod.m3u
        id: download_vod
        run: |
          VOD_URL="https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u"
          VOD_FILE="vod_temp.m3u"
          
          echo "📥 Fetching VOD playlist from $VOD_URL"
          for i in {1..3}; do
            if curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
              -o "$VOD_FILE" "$VOD_URL"; then
              echo "✅ Download succeeded on attempt $i"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 2s..."
              sleep 2
            fi
            if [ $i -eq 3 ]; then
              echo "❌ All 3 attempts failed to download vod.m3u"
              exit 1
            fi
          done

          if [ ! -s "$VOD_FILE" ]; then
            echo "❌ vod.m3u is empty — aborting"
            exit 1
          fi

          # Normalize
          sed -i '1s/^\xEF\xBB\xBF//' "$VOD_FILE"
          dos2unix "$VOD_FILE" 2>/dev/null || sed -i 's/\r$//' "$VOD_FILE"
          sed -i 's/[ \t]*$//' "$VOD_FILE"

          COUNT=$(grep -c '^#EXTINF:' "$VOD_FILE" 2>/dev/null || echo 0)
          echo "✅ vod.m3u loaded — $COUNT channel(s)"
          echo "vod_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build main.m3u (Live Tamil M3U + other.m3u + VOD)
        id: build_main
        run: |
          OUTPUT="main.m3u"
          OTHER_M3U=".github/workflows/other.m3u"
          VOD_FILE="vod_temp.m3u"

          # 1️⃣ Header
          echo "#EXTM3U x-tvg-url=\"https://iptv-org.github.io/epg/guides/tamil.xml\"" > "$OUTPUT"

          # 2️⃣ Fetch & inject live Tamil channels from M3U
          echo "# === LIVE TAMIL (M3U) ===" >> "$OUTPUT"

          M3U_URL="https://kliv.fun/jio-plus"

          echo "📡 Fetching live channel M3U from $M3U_URL"
          M3U_RAW=""
          for i in {1..3}; do
            M3U_RAW=$(curl -sfL --max-time 25 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
              -H "Accept: audio/x-mpegurl, application/vnd.apple.mpegurl, */*" \
              "$M3U_URL" 2>/dev/null) && break
            echo "⚠️ Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ -z "$M3U_RAW" ]; then
            echo "❌ All retries failed — no response from $M3U_URL"
            exit 1
          fi

          # Check for HTML error
          if [[ "${M3U_RAW:0:1}" == "<" ]]; then
            echo "❌ Received HTML instead of M3U. First 300 chars:"
            echo "$M3U_RAW" | head -c 300
            echo
            exit 1
          fi

          # Save temp file for processing
          TEMP_M3U="temp_live.m3u"
          echo "$M3U_RAW" > "$TEMP_M3U"

          # First, show all available channel names for debugging
          echo "📋 Available channels in M3U:"
          awk '
            /^#EXTINF:/ {
              line = $0
              # Try to extract channel name
              if (match(line, /,([^,]+)$/)) {
                name = substr(line, RSTART+1)
              } else if (match(line, /tvg-name="([^"]+)"/, arr)) {
                name = arr[1]
              } else if (match(line, /group-title="([^"]+)"/, arr)) {
                name = arr[1]
              } else {
                name = "UNKNOWN"
              }
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              if (name != "" && name != "UNKNOWN") {
                print "  - " name
              }
            }
          ' "$TEMP_M3U" | sort -u | head -50
          echo ""

          # Define target channels with variations for better matching
          # Format: "Display Name" -> array of search patterns
          declare -A CHANNEL_PATTERNS=(
            ["Sun TV HD"]="sun tv|sun tv hd"
            ["Sun Music HD"]="sun music|sun music hd"
            ["Sun Life"]="sun life"
            ["Adithya TV"]="adithya|aditya"
            ["KTV HD"]="ktv|ktv hd"
            ["Star Vijay HD"]="vijay|star vijay|vijay hd|vijay tv"
            ["Vijay Super HD"]="vijay super|super hd"
            ["Colors Tamil"]="colors tamil|colour tamil"
            ["Jaya TV HD"]="jaya tv|jaya tv hd|jaya hd"
            ["Jaya Plus"]="jaya plus"
            ["Jaya Max"]="jaya max"
            ["J Movies"]="j movies|jmovies"
            ["Polimer TV"]="polimer"
            ["Vasanth TV"]="vasanth|vasant"
            ["Kalaignar TV"]="kalaignar|kalaignar tv"
            ["Raj TV"]="raj tv|rajtv"
            ["Disney Channel"]="disney channel|disney"
            ["Disney Junior"]="disney junior"
            ["Hungama"]="hungama"
            ["Super Hungama"]="super hungama"
            ["Sonic Tamil"]="sonic|sonic tamil"
            ["Nick Tamil"]="nick tamil|nick"
            ["Nickelodeon Jr."]="nickelodeon|nick jr"
            ["Pogo"]="pogo"
            ["Cartoon Network"]="cartoon network|cartoon"
            ["CN HD+ Tamil"]="cn hd|cartoon network hd"
            ["Discovery Kids Tamil"]="discovery kids|discovery tamil"
            ["D Tamil"]="d tamil|dtamil"
            ["History HD"]="history|history hd|history tv18"
          )

          # Process M3U with flexible matching
          awk -v patterns="$(declare -p CHANNEL_PATTERNS 2>/dev/null || echo '')" '
            BEGIN {
              RS = "\r?\n"
              ORS = "\n"
              count = 0
              
              # Define patterns manually since bash array passing is tricky
              split("Sun TV HD:Sun TV HD:Sun TV:Sun TV HD:", patterns_arr, ":")
              # Well just hardcode the patterns in awk for simplicity
            }
            /^#EXTM3U/ { next }
            /^#EXTINF:/ {
              extinf_line = $0
              
              # Extract channel name
              name = ""
              if (match(extinf_line, /,([^,]+)$/)) {
                name = substr(extinf_line, RSTART+1)
              } else if (match(extinf_line, /tvg-name="([^"]+)"/, arr)) {
                name = arr[1]
              }
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              name_lower = tolower(name)
              
              # Check against all target patterns
              matched_display = ""
              
              if (name_lower ~ /sun tv|sun tv hd/) matched_display = "Sun TV HD"
              else if (name_lower ~ /sun music|sun music hd/) matched_display = "Sun Music HD"
              else if (name_lower ~ /sun life/) matched_display = "Sun Life"
              else if (name_lower ~ /adithya|aditya/) matched_display = "Adithya TV"
              else if (name_lower ~ /ktv|ktv hd/) matched_display = "KTV HD"
              else if (name_lower ~ /vijay[^s]|star vijay|vijay hd|vijay tv/) matched_display = "Star Vijay HD"
              else if (name_lower ~ /vijay super|super hd/) matched_display = "Vijay Super HD"
              else if (name_lower ~ /colors tamil|colour tamil/) matched_display = "Colors Tamil"
              else if (name_lower ~ /jaya tv|jaya tv hd|jaya hd/) matched_display = "Jaya TV HD"
              else if (name_lower ~ /jaya plus/) matched_display = "Jaya Plus"
              else if (name_lower ~ /jaya max/) matched_display = "Jaya Max"
              else if (name_lower ~ /j movies|jmovies/) matched_display = "J Movies"
              else if (name_lower ~ /polimer/) matched_display = "Polimer TV"
              else if (name_lower ~ /vasanth|vasant/) matched_display = "Vasanth TV"
              else if (name_lower ~ /kalaignar/) matched_display = "Kalaignar TV"
              else if (name_lower ~ /raj tv|rajtv/) matched_display = "Raj TV"
              else if (name_lower ~ /disney channel[^j]|disney$/) matched_display = "Disney Channel"
              else if (name_lower ~ /disney junior/) matched_display = "Disney Junior"
              else if (name_lower ~ /hungama[^t]/) matched_display = "Hungama"
              else if (name_lower ~ /super hungama/) matched_display = "Super Hungama"
              else if (name_lower ~ /sonic tamil|sonic[^k]/) matched_display = "Sonic Tamil"
              else if (name_lower ~ /nick tamil|nick[^e]|nick$/) matched_display = "Nick Tamil"
              else if (name_lower ~ /nickelodeon|nick jr/) matched_display = "Nickelodeon Jr."
              else if (name_lower ~ /pogo/) matched_display = "Pogo"
              else if (name_lower ~ /cartoon network[^h]|cartoon$/) matched_display = "Cartoon Network"
              else if (name_lower ~ /cn hd|cartoon network hd/) matched_display = "CN HD+ Tamil"
              else if (name_lower ~ /discovery kids|discovery tamil/) matched_display = "Discovery Kids Tamil"
              else if (name_lower ~ /d tamil|dtamil/) matched_display = "D Tamil"
              else if (name_lower ~ /history hd|history tv|history[^c]/) matched_display = "History HD"
              
              if (matched_display != "") {
                getline url_line
                if (url_line ~ /^https?:\/\// || url_line ~ /^rtmp?:\/\//) {
                  # Clean and rebuild EXTINF line
                  if (extinf_line ~ /group-title=/) {
                    gsub(/group-title="[^"]*"/, "group-title=\"Tamil\"", extinf_line)
                  } else {
                    if (extinf_line ~ /#EXTINF:-1 /) {
                      sub(/#EXTINF:-1 /, "#EXTINF:-1 group-title=\"Tamil\" ", extinf_line)
                    } else {
                      sub(/#EXTINF:/, "#EXTINF: group-title=\"Tamil\" ", extinf_line)
                    }
                  }
                  
                  # Update channel name to our standard format
                  sub(/,[^,]+$/, "," matched_display, extinf_line)
                  
                  print extinf_line
                  print url_line
                  count++
                  matched[matched_display] = 1
                }
              }
              next
            }
            { next }
            END {
              print "COUNT:" count > "/dev/stderr"
              for (ch in matched) {
                print "MATCHED:" ch > "/dev/stderr"
              }
            }
          ' "$TEMP_M3U" 2> match_log.txt >> "$OUTPUT"

          LIVE_COUNT=$(grep "COUNT:" match_log.txt 2>/dev/null | cut -d: -f2 || echo 0)
          
          echo "✅ Matched channels:"
          grep "MATCHED:" match_log.txt 2>/dev/null | cut -d: -f2 | sort || echo "  None matched"
          
          rm -f "$TEMP_M3U" match_log.txt

          # 3️⃣ Append static channels
          echo "" >> "$OUTPUT"
          echo "# === STATIC CHANNELS (from .github/workflows/other.m3u) ===" >> "$OUTPUT"
          awk '
            /^#EXTM3U/ { next }
            NF == 0 { next }
            { print }
          ' "$OTHER_M3U" >> "$OUTPUT"

          # 4️⃣ Append VOD — robust group-title enforcement
          echo "" >> "$OUTPUT"
          echo "# === VOD (from tamilrepo-dev/VOD) ===" >> "$OUTPUT"
          awk '
            BEGIN { RS = "\r?\n"; ORS = "\n" }
            /^#EXTM3U/ { next }
            NF == 0 { next }
            /^#EXTINF:/ {
              line = $0
              # Force group-title="VOD"
              if (match(line, /group-title="[^"]*"/)) {
                gsub(/group-title="[^"]*"/, "group-title=\"VOD\"", line)
              } else {
                if (match(line, /#EXTINF:-1 /)) {
                  sub(/#EXTINF:-1 /, "#EXTINF:-1 group-title=\"VOD\" ", line)
                } else if (match(line, /#EXTINF:-1,/)) {
                  sub(/#EXTINF:-1,/, "#EXTINF:-1 group-title=\"VOD\",", line)
                } else {
                  sub(/#EXTINF:/, "#EXTINF: group-title=\"VOD\" ", line)
                }
              }
              print line
              if ((getline nextline) > 0) {
                print nextline
              } else {
                print ""
              }
              next
            }
            { print }
          ' "$VOD_FILE" >> "$OUTPUT"

          # 5️⃣ Stats
          TAMIL=$(grep -c '^#EXTINF:.*group-title="Tamil"' "$OUTPUT" 2>/dev/null || echo 0)
          STATIC=$(awk '/^#EXTINF:/ && !/group-title="Tamil"/ && !/group-title="VOD"/ {count++} END {print count+0}' "$OUTPUT")
          VOD=$(grep -c '^#EXTINF.*group-title="VOD"' "$OUTPUT" 2>/dev/null || echo 0)
          TOTAL=$((TAMIL + STATIC + VOD))
          echo "✅ main.m3u built with $TOTAL channels:"
          echo "   🎯 Live Tamil (M3U): $TAMIL matched out of 29 target channels"
          echo "   📦 Static (other.m3u): $STATIC"
          echo "   🎬 VOD (tamilrepo-dev): $VOD"
          echo "tamil=$TAMIL" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "vod=${{ steps.download_vod.outputs.vod_count }}" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Commit main.m3u
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi
          git commit -m "📺 main.m3u: ${{ steps.build_main.outputs.tamil }} Live Tamil + ${{ steps.build_main.outputs.static }} Static + ${{ steps.build_main.outputs.vod }} VOD | $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
