name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests aiohttp asyncio

      - name: Verify other.m3u exists
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          if [ ! -f "$OTHER_M3U" ]; then
            echo "❌ $OTHER_M3U not found — aborting"
            exit 1
          fi
          echo "✅ $OTHER_M3U located."

      - name: Normalize other.m3u
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' "$OTHER_M3U"
          dos2unix "$OTHER_M3U" 2>/dev/null || sed -i 's/\r$//' "$OTHER_M3U"
          sed -i 's/[ \t]*$//' "$OTHER_M3U"

      - name: Download and normalize vod.m3u
        id: download_vod
        run: |
          VOD_URL="https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u"
          VOD_FILE="vod_temp.m3u"
          
          echo "📥 Fetching VOD playlist from $VOD_URL"
          for i in {1..3}; do
            if curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
              -o "$VOD_FILE" "$VOD_URL"; then
              echo "✅ Download succeeded on attempt $i"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 2s..."
              sleep 2
            fi
            if [ $i -eq 3 ]; then
              echo "❌ All 3 attempts failed to download vod.m3u"
              exit 1
            fi
          done

          if [ ! -s "$VOD_FILE" ]; then
            echo "❌ vod.m3u is empty — aborting"
            exit 1
          fi

          # Normalize
          sed -i '1s/^\xEF\xBB\xBF//' "$VOD_FILE"
          dos2unix "$VOD_FILE" 2>/dev/null || sed -i 's/\r$//' "$VOD_FILE"
          sed -i 's/[ \t]*$//' "$VOD_FILE"

          COUNT=$(grep -c '^#EXTINF:' "$VOD_FILE" 2>/dev/null || echo 0)
          echo "✅ vod.m3u loaded — $COUNT channel(s)"
          echo "vod_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build and validate main.m3u
        id: build_main
        run: |
          python3 << 'PYTHON_SCRIPT'
          import re
          import requests
          import asyncio
          import aiohttp
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import time
          import sys
          
          # Configuration
          M3U_URL = "https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u"
          OTHER_M3U_FILE = ".github/workflows/other.m3u"
          VOD_FILE = "vod_temp.m3u"
          OUTPUT_FILE = "main.m3u"
          
          # Timeout settings (seconds)
          STREAM_TIMEOUT = 5
          MAX_WORKERS = 10
          
          # Target Tamil channels with patterns
          CHANNEL_PATTERNS = {
              "Sun TV HD": [r'(?i)^sun tv hd$', r'(?i)^sun tv$', r'(?i)^sunhd$'],
              "Sun Music HD": [r'(?i)^sun music hd$', r'(?i)^sun music$', r'(?i)^sunmusic$'],
              "Sun Life": [r'(?i)^sun life$', r'(?i)^sunlife$'],
              "Adithya TV": [r'(?i)^adithya tv$', r'(?i)^adithya$', r'(?i)^aditya tv$'],
              "KTV HD": [r'(?i)^ktv hd$', r'(?i)^ktv$'],
              "Star Vijay HD": [r'(?i)^star vijay hd$', r'(?i)^vijay hd$', r'(?i)^star vijay$', r'(?i)^vijay tv$', r'(?i)^vijay$'],
              "Vijay Super HD": [r'(?i)^vijay super hd$', r'(?i)^vijay super$', r'(?i)^super vijay$'],
              "Colors Tamil": [r'(?i)^colors tamil$', r'(?i)^colour tamil$', r'(?i)^colors$', r'(?i)^colors_tamil$'],
              "Jaya TV HD": [r'(?i)^jaya tv hd$', r'(?i)^jaya tv$', r'(?i)^jayahd$'],
              "Jaya Plus": [r'(?i)^jaya plus$', r'(?i)^jayaplus$'],
              "Jaya Max": [r'(?i)^jaya max$', r'(?i)^jayamax$'],
              "J Movies": [r'(?i)^j movies$', r'(?i)^jmovies$', r'(?i)^j movie$'],
              "Polimer TV": [r'(?i)^polimer tv$', r'(?i)^polimer$'],
              "Vasanth TV": [r'(?i)^vasanth tv$', r'(?i)^vasanth$', r'(?i)^vasant tv$'],
              "Kalaignar TV": [r'(?i)^kalaignar tv$', r'(?i)^kalaignar$'],
              "Raj TV": [r'(?i)^raj tv$', r'(?i)^rajtv$', r'(?i)^raj$'],
              "Disney Channel": [r'(?i)^disney channel$', r'(?i)^disney$', r'(?i)^disney ch$'],
              "Disney Junior": [r'(?i)^disney junior$', r'(?i)^disney jr$', r'(?i)^junior$'],
              "Hungama": [r'(?i)^hungama$', r'(?i)^hungama tv$'],
              "Super Hungama": [r'(?i)^super hungama$', r'(?i)^hungama super$'],
              "Sonic Tamil": [r'(?i)^sonic tamil$', r'(?i)^sonic$', r'(?i)^sonic_tamil$'],
              "Nick Tamil": [r'(?i)^nick tamil$', r'(?i)^nick$', r'(?i)^nick_tamil$'],
              "Nickelodeon Jr.": [r'(?i)^nickelodeon jr$', r'(?i)^nick jr$', r'(?i)^nickelodeon_jr$'],
              "Pogo": [r'(?i)^pogo tamil$', r'(?i)^pogo$', r'(?i)^pogo_tamil$'],
              "Cartoon Network": [r'(?i)^cartoon network tamil$', r'(?i)^cartoon_network_tamil$', r'(?i)^cartoon network$'],
              "CN HD+ Tamil": [r'(?i)^cn hd\+ tamil$', r'(?i)^cn hd$', r'(?i)^cn_hd_tamil$'],
              "Discovery Kids Tamil": [r'(?i)^discovery kids tamil$', r'(?i)^discovery kids$'],
              "D Tamil": [r'(?i)^d tamil$', r'(?i)^dtamil$', r'(?i)^d tv$'],
              "History HD": [r'(?i)^history tv18 hd tamil$', r'(?i)^history_18_tamil$', r'(?i)^history hd$', r'(?i)^history tv18$']
          }
          
          def fetch_playlist(url):
              """Fetch playlist with retries"""
              headers = {
                  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
              }
              for attempt in range(3):
                  try:
                      resp = requests.get(url, headers=headers, timeout=15)
                      if resp.status_code == 200 and not resp.text.startswith('<'):
                          return resp.text
                  except:
                      pass
                  time.sleep(2)
              return None
          
          def parse_m3u(content):
              """Parse M3U content into list of (extinf, url) pairs"""
              channels = []
              lines = content.strip().split('\n')
              i = 0
              while i < len(lines):
                  line = lines[i].strip()
                  if line.startswith('#EXTINF:'):
                      if i + 1 < len(lines):
                          url = lines[i + 1].strip()
                          if url.startswith(('http://', 'https://', 'rtmp://')):
                              channels.append((line, url))
                      i += 2
                  else:
                      i += 1
              return channels
          
          def check_stream(url):
              """Check if stream URL is working (quick HEAD request)"""
              try:
                  # Try HEAD first
                  resp = requests.head(url, timeout=STREAM_TIMEOUT, allow_redirects=True)
                  if resp.status_code in [200, 206, 302, 301]:
                      return True
                  
                  # Fallback to GET with small range
                  resp = requests.get(url, timeout=STREAM_TIMEOUT, stream=True, headers={'Range': 'bytes=0-1'})
                  if resp.status_code in [200, 206, 302, 301]:
                      return True
                  
                  # Final fallback - try GET with small timeout
                  resp = requests.get(url, timeout=STREAM_TIMEOUT, stream=True)
                  if resp.status_code == 200:
                      # Read just first few bytes
                      for _ in resp.iter_content(chunk_size=1024):
                          break
                      return True
              except:
                  pass
              return False
          
          def filter_working_streams(channels, name="streams"):
              """Filter out non-working streams"""
              print(f"\n🔍 Checking {len(channels)} {name}...", file=sys.stderr)
              
              working = []
              failed = 0
              
              with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
                  future_to_url = {executor.submit(check_stream, url): (extinf, url) 
                                   for extinf, url in channels}
                  
                  for future in as_completed(future_to_url):
                      extinf, url = future_to_url[future]
                      try:
                          if future.result():
                              working.append((extinf, url))
                          else:
                              failed += 1
                              # Extract channel name for logging
                              name_match = re.search(r',([^,]+)$', extinf)
                              ch_name = name_match.group(1) if name_match else "Unknown"
                              print(f"  ❌ Dead: {ch_name}", file=sys.stderr)
                      except:
                          failed += 1
              
              print(f"✅ {len(working)} working, {failed} dead from {name}", file=sys.stderr)
              return working
          
          def process_live_channels():
              """Extract and validate live Tamil channels"""
              print("\n📡 Fetching live playlist...", file=sys.stderr)
              content = fetch_playlist(M3U_URL)
              if not content:
                  print("❌ Failed to fetch live playlist", file=sys.stderr)
                  return []
              
              lines = content.split('\n')
              matched_channels = []
              matched_names = set()
              
              print("🎯 Extracting Tamil channels...", file=sys.stderr)
              
              i = 0
              while i < len(lines):
                  line = lines[i].strip()
                  if line.startswith('#EXTINF:'):
                      # Extract channel name
                      name_match = re.search(r',([^,]+)$', line)
                      if name_match:
                          channel_name = name_match.group(1).strip()
                          
                          # Check against patterns
                          matched_display = None
                          for display_name, patterns in CHANNEL_PATTERNS.items():
                              for pattern in patterns:
                                  if re.match(pattern, channel_name, re.IGNORECASE):
                                      matched_display = display_name
                                      break
                              if matched_display:
                                  break
                          
                          if matched_display and matched_display not in matched_names and i + 1 < len(lines):
                              url = lines[i + 1].strip()
                              if url.startswith(('http://', 'https://', 'rtmp://')):
                                  # Preserve attributes
                                  tvg_id = re.search(r'tvg-id="([^"]*)"', line)
                                  tvg_name = re.search(r'tvg-name="([^"]*)"', line)
                                  tvg_logo = re.search(r'tvg-logo="([^"]*)"', line)
                                  
                                  new_extinf = '#EXTINF:-1'
                                  if tvg_id:
                                      new_extinf += f' tvg-id="{tvg_id.group(1)}"'
                                  if tvg_name:
                                      new_extinf += f' tvg-name="{tvg_name.group(1)}"'
                                  if tvg_logo:
                                      new_extinf += f' tvg-logo="{tvg_logo.group(1)}"'
                                  new_extinf += f' group-title="Tamil",{matched_display}'
                                  
                                  matched_channels.append((new_extinf, url))
                                  matched_names.add(matched_display)
                                  print(f"  ✓ {channel_name} -> {matched_display}", file=sys.stderr)
                      i += 2
                  else:
                      i += 1
              
              print(f"\n📊 Found {len(matched_channels)} Tamil channels", file=sys.stderr)
              
              # Filter working streams
              if matched_channels:
                  working = filter_working_streams(matched_channels, "live channels")
                  return working
              return []
          
          def process_static_channels():
              """Process and validate static channels from other.m3u"""
              print("\n📦 Processing static channels from other.m3u...", file=sys.stderr)
              
              try:
                  with open(OTHER_M3U_FILE, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                  
                  channels = parse_m3u(content)
                  print(f"📊 Found {len(channels)} static channels", file=sys.stderr)
                  
                  if channels:
                      working = filter_working_streams(channels, "static channels")
                      return working
              except Exception as e:
                  print(f"⚠️ Error processing other.m3u: {e}", file=sys.stderr)
              
              return []
          
          def process_vod():
              """Process and validate VOD channels"""
              print("\n🎬 Processing VOD channels...", file=sys.stderr)
              
              try:
                  with open(VOD_FILE, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                  
                  channels = parse_m3u(content)
                  print(f"📊 Found {len(channels)} VOD channels", file=sys.stderr)
                  
                  # VOD might be slower, use longer timeout
                  global STREAM_TIMEOUT
                  original_timeout = STREAM_TIMEOUT
                  STREAM_TIMEOUT = 8
                  
                  if channels:
                      working = filter_working_streams(channels, "VOD channels")
                      
                      # Add group-title="VOD" to working channels
                      processed = []
                      for extinf, url in working:
                          if 'group-title=' not in extinf:
                              if '#EXTINF:-1 ' in extinf:
                                  extinf = extinf.replace('#EXTINF:-1 ', '#EXTINF:-1 group-title="VOD" ')
                              else:
                                  extinf = extinf.replace('#EXTINF:', '#EXTINF: group-title="VOD" ')
                          else:
                              extinf = re.sub(r'group-title="[^"]*"', 'group-title="VOD"', extinf)
                          processed.append((extinf, url))
                      
                      STREAM_TIMEOUT = original_timeout
                      return processed
                  
                  STREAM_TIMEOUT = original_timeout
              except Exception as e:
                  print(f"⚠️ Error processing VOD: {e}", file=sys.stderr)
              
              return []
          
          def write_output(live, static, vod):
              """Write final M3U file"""
              with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
                  f.write('#EXTM3U x-tvg-url="https://iptv-org.github.io/epg/guides/tamil.xml"\n\n')
                  
                  # Live Tamil channels
                  f.write('# === LIVE TAMIL CHANNELS ===\n')
                  for extinf, url in live:
                      f.write(f'{extinf}\n{url}\n')
                  
                  # Static channels
                  if static:
                      f.write('\n# === STATIC CHANNELS ===\n')
                      for extinf, url in static:
                          f.write(f'{extinf}\n{url}\n')
                  
                  # VOD channels
                  if vod:
                      f.write('\n# === VOD CONTENT ===\n')
                      for extinf, url in vod:
                          f.write(f'{extinf}\n{url}\n')
              
              # Stats
              total = len(live) + len(static) + len(vod)
              print(f"\n{'='*50}", file=sys.stderr)
              print(f"✅ FINAL OUTPUT: {total} working channels", file=sys.stderr)
              print(f"   🎯 Live Tamil: {len(live)}", file=sys.stderr)
              print(f"   📦 Static: {len(static)}", file=sys.stderr)
              print(f"   🎬 VOD: {len(vod)}", file=sys.stderr)
              print(f"{'='*50}", file=sys.stderr)
              
              # Output for GitHub Actions
              print(f"tamil={len(live)}")
              print(f"static={len(static)}")
              print(f"vod={len(vod)}")
              print(f"total={total}")
          
          # Main execution
          print("🚀 Starting M3U builder with stream validation...", file=sys.stderr)
          
          live_channels = process_live_channels()
          static_channels = process_static_channels()
          vod_channels = process_vod()
          
          write_output(live_channels, static_channels, vod_channels)
          
          PYTHON_SCRIPT

      - name: Save outputs
        id: save_outputs
        run: |
          # Parse Python output
          python3 << 'EOF'
          import sys
          with open('main.m3u', 'r') as f:
              content = f.read()
          
          tamil = content.count('group-title="Tamil"')
          static = content.count('# === STATIC CHANNELS ===') 
          vod = content.count('group-title="VOD"')
          
          # Count actual channels
          tamil_count = len([l for l in content.split('\n') if 'group-title="Tamil"' in l])
          vod_count = len([l for l in content.split('\n') if 'group-title="VOD"' in l])
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"tamil={tamil_count}\n")
              f.write(f"vod={vod_count}\n")
          EOF

      - name: Commit main.m3u
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi
          git commit -m "📺 main.m3u: ${{ steps.build_main.outputs.tamil }} Live + ${{ steps.build_main.outputs.static }} Static + ${{ steps.build_main.outputs.vod }} VOD | $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
