name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify other.m3u exists
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          if [ ! -f "$OTHER_M3U" ]; then
            echo "вќЊ $OTHER_M3U not found вЂ” aborting"
            exit 1
          fi
          echo "вњ… $OTHER_M3U located."

      - name: Normalize other.m3u
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' "$OTHER_M3U"
          dos2unix "$OTHER_M3U" 2>/dev/null || sed -i 's/\r$//' "$OTHER_M3U"
          sed -i 's/[ \t]*$//' "$OTHER_M3U"

      - name: Download and normalize vod.m3u
        id: download_vod
        run: |
          VOD_URL="https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u"
          VOD_FILE="vod_temp.m3u"
          
          echo "рџ“Ґ Fetching VOD playlist from $VOD_URL"
          for i in {1..3}; do
            if curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
              -o "$VOD_FILE" "$VOD_URL"; then
              echo "вњ… Download succeeded on attempt $i"
              break
            else
              echo "вљ пёЏ Attempt $i failed, retrying in 2s..."
              sleep 2
            fi
            if [ $i -eq 3 ]; then
              echo "вќЊ All 3 attempts failed to download vod.m3u"
              exit 1
            fi
          done

          if [ ! -s "$VOD_FILE" ]; then
            echo "вќЊ vod.m3u is empty вЂ” aborting"
            exit 1
          fi

          # Normalize
          sed -i '1s/^\xEF\xBB\xBF//' "$VOD_FILE"
          dos2unix "$VOD_FILE" 2>/dev/null || sed -i 's/\r$//' "$VOD_FILE"
          sed -i 's/[ \t]*$//' "$VOD_FILE"

          COUNT=$(grep -c '^#EXTINF:' "$VOD_FILE" 2>/dev/null || echo 0)
          echo "вњ… vod.m3u loaded вЂ” $COUNT channel(s)"
          echo "vod_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build main.m3u (Live Tamil M3U + other.m3u + VOD)
        id: build_main
        run: |
          OUTPUT="main.m3u"
          OTHER_M3U=".github/workflows/other.m3u"
          VOD_FILE="vod_temp.m3u"

          # 1пёЏвѓЈ Header
          echo "#EXTM3U x-tvg-url=\"https://iptv-org.github.io/epg/guides/tamil.xml\"" > "$OUTPUT"

          # 2пёЏвѓЈ Fetch & inject live Tamil channels from M3U (supports HTML or direct M3U)
          echo "# === LIVE TAMIL (M3U) ===" >> "$OUTPUT"

          M3U_URL="https://allinonereborn.online/m3u/jtv145.m3u"

          echo "рџ“Ў Fetching live channel from $M3U_URL"
          M3U_RAW=""
          for i in {1..3}; do
            M3U_RAW=$(curl -sfL --max-time 25 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
              -H "Accept: audio/x-mpegurl, application/vnd.apple.mpegurl, */*" \
              "$M3U_URL" 2>/dev/null) && break
            echo "вљ пёЏ Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ -z "$M3U_RAW" ]; then
            echo "вќЊ All retries failed вЂ” no response from $M3U_URL"
            exit 1
          fi

          # Save raw response for processing
          echo "$M3U_RAW" > raw_response.txt

          # Extract M3U content (handles both direct M3U and HTML with embedded M3U)
          python3 << 'PYTHON_EXTRACT'
import re
import sys

with open('raw_response.txt', 'r', encoding='utf-8', errors='ignore') as f:
    raw_content = f.read()

# Check if it's HTML
if raw_content.strip().startswith('<'):
    print("вљ пёЏ Received HTML, attempting to extract M3U...", file=sys.stderr)
    
    # Look for M3U content in HTML
    # Pattern 1: Look for #EXTM3U in the HTML
    m3u_pattern = r'(#EXTM3U.*?)(?=</(?:pre|code|div|body)>|$)'
    match = re.search(m3u_pattern, raw_content, re.DOTALL | re.IGNORECASE)
    
    if match:
        extracted = match.group(1)
        # Clean up HTML entities
        extracted = re.sub(r'&lt;', '<', extracted)
        extracted = re.sub(r'&gt;', '>', extracted)
        extracted = re.sub(r'&amp;', '&', extracted)
        extracted = re.sub(r'&quot;', '"', extracted)
        with open('extracted_m3u.txt', 'w', encoding='utf-8') as out:
            out.write(extracted)
        print("вњ… Extracted M3U from HTML", file=sys.stderr)
        sys.exit(0)
    
    # Pattern 2: Look for M3U URLs in the HTML
    url_pattern = r'https?://[^\s<>"\']+\.m3u[^\s<>"\']*'
    m3u_urls = re.findall(url_pattern, raw_content)
    
    if m3u_urls:
        print(f"рџ“Ћ Found M3U URLs in HTML: {m3u_urls[0]}", file=sys.stderr)
        with open('extracted_url.txt', 'w', encoding='utf-8') as out:
            out.write(m3u_urls[0])
        sys.exit(0)
    
    print("вќЊ No M3U content or URLs found in HTML", file=sys.stderr)
    sys.exit(1)
else:
    # Direct M3U content
    with open('extracted_m3u.txt', 'w', encoding='utf-8') as out:
        out.write(raw_content)
    print("вњ… Direct M3U content received", file=sys.stderr)
    sys.exit(0)
PYTHON_EXTRACT

          EXTRACT_STATUS=$?
          
          if [ $EXTRACT_STATUS -ne 0 ]; then
              echo "вќЊ Failed to extract M3U content"
              exit 1
          fi
          
          TEMP_M3U="temp_live.m3u"
          
          # Check if we have an extracted URL to fetch
          if [ -f extracted_url.txt ]; then
              M3U_URL2=$(cat extracted_url.txt)
              echo "рџ“Ґ Fetching M3U from extracted URL: $M3U_URL2"
              
              for i in {1..3}; do
                if curl -sfL --max-time 25 \
                  -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
                  -o "$TEMP_M3U" "$M3U_URL2"; then
                  echo "вњ… Downloaded M3U from extracted URL"
                  break
                else
                  echo "вљ пёЏ Attempt $i failed to fetch extracted URL"
                  sleep 2
                fi
                if [ $i -eq 3 ]; then
                  echo "вќЊ Failed to fetch M3U from extracted URL"
                  exit 1
                fi
              done
              rm -f extracted_url.txt
          elif [ -f extracted_m3u.txt ]; then
              mv extracted_m3u.txt "$TEMP_M3U"
          else
              echo "вќЊ No extracted content found"
              exit 1
          fi
          
          rm -f raw_response.txt
          
          # Verify we have valid M3U content
          if [ ! -f "$TEMP_M3U" ] || [ ! -s "$TEMP_M3U" ]; then
              echo "вќЊ No valid M3U content obtained"
              exit 1
          fi
          
          # Check if it's actually M3U format
          if ! grep -q "^#EXTM3U" "$TEMP_M3U"; then
              echo "вљ пёЏ Warning: Downloaded file doesn't start with #EXTM3U"
              echo "First 500 chars:"
              head -c 500 "$TEMP_M3U"
              echo ""
              # Try to find M3U content anyway
              if grep -q "#EXTINF:" "$TEMP_M3U"; then
                  echo "вњ… Found #EXTINF lines, continuing anyway"
              else
                  echo "вќЊ No M3U format detected"
                  exit 1
              fi
          fi

          # Process M3U with exact matching and preserve logos
          python3 << 'PYTHON_SCRIPT'
import re
import sys

# Read the temp M3U file
try:
    with open('temp_live.m3u', 'r', encoding='utf-8', errors='ignore') as f:
        lines = f.readlines()
except:
    print("вќЊ Failed to read temp_live.m3u", file=sys.stderr)
    sys.exit(1)

# Target channels with exact match patterns (case insensitive)
# Format: "Display Name" -> [pattern1, pattern2, ...]
channel_patterns = {
    "Sun TV HD": [r'(?i)^sun tv hd$', r'(?i)^sun tv$', r'(?i)^sunhd$'],
    "Sun Music HD": [r'(?i)^sun music hd$', r'(?i)^sun music$', r'(?i)^sunmusic$'],
    "Sun Life": [r'(?i)^sun life$', r'(?i)^sunlife$'],
    "Adithya TV": [r'(?i)^adithya tv$', r'(?i)^adithya$', r'(?i)^aditya tv$'],
    "KTV HD": [r'(?i)^ktv hd$', r'(?i)^ktv$'],
    "Star Vijay HD": [r'(?i)^star vijay hd$', r'(?i)^vijay hd$', r'(?i)^star vijay$', r'(?i)^vijay tv$', r'(?i)^vijay$'],
    "Vijay Super HD": [r'(?i)^vijay super hd$', r'(?i)^vijay super$', r'(?i)^super vijay$'],
    "Colors Tamil": [r'(?i)^colors tamil$', r'(?i)^colour tamil$', r'(?i)^colors$'],
    "Jaya TV HD": [r'(?i)^jaya tv hd$', r'(?i)^jaya tv$', r'(?i)^jayahd$'],
    "Jaya Plus": [r'(?i)^jaya plus$', r'(?i)^jayaplus$'],
    "Jaya Max": [r'(?i)^jaya max$', r'(?i)^jayamax$'],
    "J Movies": [r'(?i)^j movies$', r'(?i)^jmovies$', r'(?i)^j movie$'],
    "Polimer TV": [r'(?i)^polimer tv$', r'(?i)^polimer$'],
    "Vasanth TV": [r'(?i)^vasanth tv$', r'(?i)^vasanth$', r'(?i)^vasant tv$'],
    "Kalaignar TV": [r'(?i)^kalaignar tv$', r'(?i)^kalaignar$'],
    "Raj TV": [r'(?i)^raj tv$', r'(?i)^rajtv$', r'(?i)^raj$'],
    "Disney Channel": [r'(?i)^disney channel$', r'(?i)^disney$', r'(?i)^disney ch$'],
    "Disney Junior": [r'(?i)^disney junior$', r'(?i)^disney jr$', r'(?i)^junior$'],
    "Hungama": [r'(?i)^hungama$', r'(?i)^hungama tv$'],
    "Super Hungama": [r'(?i)^super hungama$', r'(?i)^hungama super$'],
    "Sonic Tamil": [r'(?i)^sonic tamil$', r'(?i)^sonic$', r'(?i)^sonic tv$'],
    "Nick Tamil": [r'(?i)^nick tamil$', r'(?i)^nick$', r'(?i)^nick tv$'],
    "Nickelodeon Jr.": [r'(?i)^nickelodeon jr$', r'(?i)^nick jr$', r'(?i)^nickelodeon junior$'],
    "Pogo": [r'(?i)^pogo$', r'(?i)^pogo tv$'],
    "Cartoon Network": [r'(?i)^cartoon network$', r'(?i)^cn$', r'(?i)^cartoon$'],
    "CN HD+ Tamil": [r'(?i)^cn hd\+ tamil$', r'(?i)^cn hd$', r'(?i)^cn\+$'],
    "Discovery Kids Tamil": [r'(?i)^discovery kids tamil$', r'(?i)^discovery kids$', r'(?i)^kids discovery$'],
    "D Tamil": [r'(?i)^d tamil$', r'(?i)^dtamil$', r'(?i)^d tv$'],
    "History HD": [r'(?i)^history hd$', r'(?i)^history$', r'(?i)^history tv18$']
}

matched_channels = []
matched_names = set()

i = 0
while i < len(lines):
    line = lines[i].strip()
    if line.startswith('#EXTINF:'):
        # Extract channel name from the line
        # Look for pattern: ,ChannelName at the end
        match = re.search(r',([^,]+)$', line)
        if match:
            channel_name = match.group(1).strip()
            
            # Check if this channel matches any target pattern
            matched_display = None
            for display_name, patterns in channel_patterns.items():
                for pattern in patterns:
                    if re.match(pattern, channel_name, re.IGNORECASE):
                        matched_display = display_name
                        break
                if matched_display:
                    break
            
            # Only add if not already matched (prefer first occurrence)
            if matched_display and matched_display not in matched_names and i + 1 < len(lines):
                url_line = lines[i + 1].strip()
                if url_line.startswith(('http://', 'https://', 'rtmp://')):
                    # Extract existing attributes
                    tvg_id_match = re.search(r'tvg-id="([^"]*)"', line)
                    tvg_name_match = re.search(r'tvg-name="([^"]*)"', line)
                    tvg_logo_match = re.search(r'tvg-logo="([^"]*)"', line)
                    tvg_url_match = re.search(r'tvg-url="([^"]*)"', line)
                    
                    tvg_id = tvg_id_match.group(1) if tvg_id_match else ""
                    tvg_name = tvg_name_match.group(1) if tvg_name_match else matched_display
                    tvg_logo = tvg_logo_match.group(1) if tvg_logo_match else ""
                    tvg_url = tvg_url_match.group(1) if tvg_url_match else ""
                    
                    # Build new EXTINF line preserving all attributes
                    new_extinf = '#EXTINF:-1'
                    if tvg_id:
                        new_extinf += f' tvg-id="{tvg_id}"'
                    if tvg_name:
                        new_extinf += f' tvg-name="{tvg_name}"'
                    if tvg_logo:
                        new_extinf += f' tvg-logo="{tvg_logo}"'
                    if tvg_url:
                        new_extinf += f' tvg-url="{tvg_url}"'
                    new_extinf += f' group-title="Tamil",{matched_display}'
                    
                    matched_channels.append((new_extinf, url_line))
                    matched_names.add(matched_display)
                    print(f"вњ… Matched: {channel_name} -> {matched_display}", file=sys.stderr)
        i += 2
    else:
        i += 1

# Write matched channels to file
with open('matched_channels.txt', 'w', encoding='utf-8') as f:
    for extinf, url in matched_channels:
        f.write(extinf + '\n')
        f.write(url + '\n')

print(f"COUNT:{len(matched_channels)}", file=sys.stderr)
print(f"MATCHED:{','.join(matched_names)}", file=sys.stderr)
PYTHON_SCRIPT

          # Append matched channels to main.m3u
          if [ -f matched_channels.txt ]; then
            cat matched_channels.txt >> "$OUTPUT"
            LIVE_COUNT=$(grep -c '^#EXTINF:' matched_channels.txt 2>/dev/null || echo 0)
            echo "вњ… Matched $LIVE_COUNT channels"
            rm -f matched_channels.txt
          else
            LIVE_COUNT=0
            echo "вљ пёЏ No channels matched"
          fi

          rm -f "$TEMP_M3U"

          # 3пёЏвѓЈ Append static channels (preserve their original logos and attributes)
          echo "" >> "$OUTPUT"
          echo "# === STATIC CHANNELS (from .github/workflows/other.m3u) ===" >> "$OUTPUT"
          grep -v '^#EXTM3U' "$OTHER_M3U" | grep -v '^$' >> "$OUTPUT"

          # 4пёЏвѓЈ Append VOD (preserve existing logos and attributes)
          echo "" >> "$OUTPUT"
          echo "# === VOD (from tamilrepo-dev/VOD) ===" >> "$OUTPUT"
          python3 << 'PYTHON_VOD'
import re

with open('vod_temp.m3u', 'r', encoding='utf-8', errors='ignore') as f:
    lines = f.readlines()

output_lines = []
i = 0
while i < len(lines):
    line = lines[i].strip()
    if line.startswith('#EXTINF:'):
        # Check if group-title exists
        if 'group-title=' not in line:
            # Add group-title="VOD" while preserving everything else
            if '#EXTINF:-1 ' in line:
                line = line.replace('#EXTINF:-1 ', '#EXTINF:-1 group-title="VOD" ')
            elif '#EXTINF:-1,' in line:
                line = line.replace('#EXTINF:-1,', '#EXTINF:-1 group-title="VOD",')
            else:
                line = line.replace('#EXTINF:', '#EXTINF: group-title="VOD" ')
        else:
            # Replace existing group-title with VOD
            line = re.sub(r'group-title="[^"]*"', 'group-title="VOD"', line)
        
        output_lines.append(line + '\n')
        if i + 1 < len(lines):
            output_lines.append(lines[i + 1])
        i += 2
    else:
        if line and not line.startswith('#EXTM3U'):
            output_lines.append(line + '\n')
        i += 1

with open('vod_processed.txt', 'w', encoding='utf-8') as f:
    f.writelines(output_lines)
PYTHON_VOD
          
          cat vod_processed.txt >> "$OUTPUT"
          rm -f vod_processed.txt

          # 5пёЏвѓЈ Stats
          TAMIL=$(grep -c '^#EXTINF:.*group-title="Tamil"' "$OUTPUT" 2>/dev/null || echo 0)
          STATIC=$(grep -c '^#EXTINF:' "$OTHER_M3U" 2>/dev/null || echo 0)
          VOD=$(grep -c '^#EXTINF:.*group-title="VOD"' "$OUTPUT" 2>/dev/null || echo 0)
          TOTAL=$((TAMIL + STATIC + VOD))
          
          echo "вњ… main.m3u built successfully!"
          echo "   рџЋЇ Live Tamil Channels: $TAMIL"
          echo "   рџ“¦ Static Channels: $STATIC"
          echo "   рџЋ¬ VOD Channels: $VOD"
          echo "   рџ“Љ Total Channels: $TOTAL"
          
          echo "tamil=$TAMIL" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "vod=${{ steps.download_vod.outputs.vod_count }}" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Commit main.m3u
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.m3u
          if git diff --cached --quiet; then
            echo "вћЎпёЏ No changes вЂ” skipping commit"
            exit 0
          fi
          git commit -m "рџ“є main.m3u: ${{ steps.build_main.outputs.tamil }} Live Tamil + ${{ steps.build_main.outputs.static }} Static + ${{ steps.build_main.outputs.vod }} VOD | $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
