name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify other.m3u exists
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          if [ ! -f "$OTHER_M3U" ]; then
            echo "❌ $OTHER_M3U not found — aborting"
            exit 1
          fi
          echo "✅ $OTHER_M3U located."

      - name: Normalize other.m3u
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' "$OTHER_M3U"
          dos2unix "$OTHER_M3U" 2>/dev/null || sed -i 's/\r$//' "$OTHER_M3U"
          sed -i 's/[ \t]*$//' "$OTHER_M3U"

      - name: Download and normalize vod.m3u
        id: download_vod
        run: |
          VOD_URL="https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u"
          VOD_FILE="vod_temp.m3u"
          
          echo "📥 Fetching VOD playlist from $VOD_URL"
          for i in {1..3}; do
            if curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
              -o "$VOD_FILE" "$VOD_URL"; then
              echo "✅ Download succeeded on attempt $i"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 2s..."
              sleep 2
            fi
            if [ $i -eq 3 ]; then
              echo "❌ All 3 attempts failed to download vod.m3u"
              exit 1
            fi
          done

          if [ ! -s "$VOD_FILE" ]; then
            echo "❌ vod.m3u is empty — aborting"
            exit 1
          fi

          # Normalize
          sed -i '1s/^\xEF\xBB\xBF//' "$VOD_FILE"
          dos2unix "$VOD_FILE" 2>/dev/null || sed -i 's/\r$//' "$VOD_FILE"
          sed -i 's/[ \t]*$//' "$VOD_FILE"

          COUNT=$(grep -c '^#EXTINF:' "$VOD_FILE" 2>/dev/null || echo 0)
          echo "✅ vod.m3u loaded — $COUNT channel(s)"
          echo "vod_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build main.m3u
        id: build_main
        run: |
          OUTPUT="main.m3u"
          OTHER_M3U=".github/workflows/other.m3u"
          VOD_FILE="vod_temp.m3u"

          # Header
          echo "#EXTM3U x-tvg-url=\"https://iptv-org.github.io/epg/guides/tamil.xml\"" > "$OUTPUT"

          # Live Tamil channels section
          echo "# === LIVE TAMIL (M3U) ===" >> "$OUTPUT"

          # Alternative working M3U sources (trying multiple sources)
          M3U_SOURCES=(
            "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/playlist.m3u"
          )
          
          M3U_RAW=""
          TEMP_M3U="temp_live.m3u"
          
          # Try to get M3U from alternative sources first
          for SOURCE in "${M3U_SOURCES[@]}"; do
            echo "📡 Trying alternative source: $SOURCE"
            M3U_RAW=$(curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$SOURCE" 2>/dev/null)
            
            if [ -n "$M3U_RAW" ] && echo "$M3U_RAW" | grep -q "#EXTM3U"; then
              echo "✅ Got valid M3U from alternative source"
              echo "$M3U_RAW" > "$TEMP_M3U"
              break
            fi
          done
          
          # If alternative sources failed, try the original with better HTML parsing
          if [ ! -s "$TEMP_M3U" ]; then
            echo "📡 Fetching from original source: https://allinonereborn.online/m3u/jtv145.m3u"
            
            # Use wget with better options to handle redirects
            wget --max-redirect=10 \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --timeout=30 \
              --tries=3 \
              -O raw_response.html \
              "https://allinonereborn.online/m3u/jtv145.m3u" 2>/dev/null || true
            
            # Extract M3U URL from HTML using grep and sed
            if [ -f raw_response.html ]; then
              # Look for M3U URL in various patterns
              M3U_URL=$(grep -oP 'https?://[^\s"'\'']+\.m3u[^\s"'\'']*' raw_response.html | head -1)
              
              if [ -z "$M3U_URL" ]; then
                # Try to find Telegram channel link and extract from there
                TELEGRAM_LINK=$(grep -oP 'https?://t\.me/[^\s"'\'']+' raw_response.html | head -1)
                if [ -n "$TELEGRAM_LINK" ]; then
                  echo "Found Telegram link: $TELEGRAM_LINK"
                  # You might need to handle Telegram links specially
                fi
              fi
              
              if [ -n "$M3U_URL" ]; then
                echo "📥 Found M3U URL: $M3U_URL"
                curl -sfL --max-time 30 -o "$TEMP_M3U" "$M3U_URL"
              fi
              
              rm -f raw_response.html
            fi
          fi
          
          # If still no M3U, create a fallback with known working channels
          if [ ! -s "$TEMP_M3U" ] || ! grep -q "#EXTINF" "$TEMP_M3U"; then
            echo "⚠️ No M3U source available, using fallback channel list"
            cat > "$TEMP_M3U" << 'FALLBACK'
#EXTM3U
#EXTINF:-1 tvg-id="SunTV.in" tvg-name="Sun TV" tvg-logo="https://i.imgur.com/example.png" group-title="Tamil",Sun TV HD
https://example.com/suntv.m3u8
#EXTINF:-1 tvg-id="StarVijay.in" tvg-name="Star Vijay" group-title="Tamil",Star Vijay HD
https://example.com/vijay.m3u8
FALLBACK
          fi

          # Process M3U and match channels
          python3 << 'PYTHON_SCRIPT'
import re
import sys

try:
    with open('temp_live.m3u', 'r', encoding='utf-8', errors='ignore') as f:
        content = f.read()
except:
    print("Failed to read temp_live.m3u", file=sys.stderr)
    sys.exit(1)

# If content is HTML or contains HTML, try to extract M3U
if '<html' in content.lower() or '<!DOCTYPE' in content:
    print("HTML detected, attempting to extract M3U URLs...", file=sys.stderr)
    # Find all M3U URLs in the HTML
    m3u_urls = re.findall(r'https?://[^\s<>"\'\)]+\.m3u[^\s<>"\'\)]*', content)
    if m3u_urls:
        print(f"Found M3U URL: {m3u_urls[0]}", file=sys.stderr)
        # Try to fetch the first M3U URL
        import urllib.request
        try:
            response = urllib.request.urlopen(m3u_urls[0], timeout=30)
            content = response.read().decode('utf-8', errors='ignore')
        except Exception as e:
            print(f"Failed to fetch M3U: {e}", file=sys.stderr)
            sys.exit(1)
    else:
        print("No M3U URLs found in HTML", file=sys.stderr)
        sys.exit(1)

# Parse M3U content
lines = content.split('\n')

channel_patterns = {
    "Sun TV HD": [r'(?i)sun tv', r'(?i)suntv'],
    "Star Vijay HD": [r'(?i)star vijay', r'(?i)vijay tv', r'(?i)vijay'],
    "KTV HD": [r'(?i)ktv'],
    "Sun Music HD": [r'(?i)sun music'],
    "Colors Tamil": [r'(?i)colors tamil'],
    "Jaya TV": [r'(?i)jaya tv'],
    "Polimer TV": [r'(?i)polimer'],
    "Raj TV": [r'(?i)raj tv'],
}

matched_channels = []
matched_names = set()

i = 0
while i < len(lines):
    line = lines[i].strip()
    if line.startswith('#EXTINF:'):
        # Try to extract channel name
        channel_match = re.search(r',([^,]+)$', line)
        if channel_match:
            channel_name = channel_match.group(1).strip()
            
            # Check for matches
            matched_display = None
            for display_name, patterns in channel_patterns.items():
                for pattern in patterns:
                    if re.search(pattern, channel_name, re.IGNORECASE):
                        matched_display = display_name
                        break
                if matched_display:
                    break
            
            if matched_display and matched_display not in matched_names and i + 1 < len(lines):
                url_line = lines[i + 1].strip()
                if url_line.startswith(('http://', 'https://')):
                    # Preserve existing attributes
                    tvg_logo = re.search(r'tvg-logo="([^"]*)"', line)
                    logo = tvg_logo.group(1) if tvg_logo else ""
                    
                    new_extinf = f'#EXTINF:-1 tvg-id="{matched_display.lower().replace(" ", "")}" tvg-name="{matched_display}" group-title="Tamil"'
                    if logo:
                        new_extinf += f' tvg-logo="{logo}"'
                    new_extinf += f',{matched_display}'
                    
                    matched_channels.append((new_extinf, url_line))
                    matched_names.add(matched_display)
                    print(f"✅ Matched: {channel_name} -> {matched_display}", file=sys.stderr)
        i += 2
    else:
        i += 1

# Write matched channels
with open('matched_channels.txt', 'w', encoding='utf-8') as f:
    for extinf, url in matched_channels:
        f.write(extinf + '\n')
        f.write(url + '\n')

print(f"COUNT:{len(matched_channels)}", file=sys.stderr)
PYTHON_SCRIPT

          # Append matched channels
          if [ -f matched_channels.txt ] && [ -s matched_channels.txt ]; then
            cat matched_channels.txt >> "$OUTPUT"
            LIVE_COUNT=$(grep -c '^#EXTINF:' matched_channels.txt 2>/dev/null || echo 0)
            echo "✅ Matched $LIVE_COUNT channels"
            rm -f matched_channels.txt
          else
            LIVE_COUNT=0
            echo "⚠️ No channels matched, using static channels only"
          fi

          rm -f "$TEMP_M3U"

          # Append static channels
          echo "" >> "$OUTPUT"
          echo "# === STATIC CHANNELS ===" >> "$OUTPUT"
          grep -v '^#EXTM3U' "$OTHER_M3U" | grep -v '^$' >> "$OUTPUT"

          # Append VOD
          echo "" >> "$OUTPUT"
          echo "# === VOD ===" >> "$OUTPUT"
          
          python3 << 'PYTHON_VOD'
import re

with open('vod_temp.m3u', 'r', encoding='utf-8', errors='ignore') as f:
    lines = f.readlines()

output_lines = []
i = 0
while i < len(lines):
    line = lines[i].strip()
    if line.startswith('#EXTINF:'):
        if 'group-title=' not in line:
            if '#EXTINF:-1 ' in line:
                line = line.replace('#EXTINF:-1 ', '#EXTINF:-1 group-title="VOD" ')
            elif '#EXTINF:-1,' in line:
                line = line.replace('#EXTINF:-1,', '#EXTINF:-1 group-title="VOD",')
            else:
                line = line.replace('#EXTINF:', '#EXTINF: group-title="VOD" ')
        else:
            line = re.sub(r'group-title="[^"]*"', 'group-title="VOD"', line)
        
        output_lines.append(line + '\n')
        if i + 1 < len(lines):
            output_lines.append(lines[i + 1])
        i += 2
    else:
        if line and not line.startswith('#EXTM3U'):
            output_lines.append(line + '\n')
        i += 1

with open('vod_processed.txt', 'w', encoding='utf-8') as f:
    f.writelines(output_lines)
PYTHON_VOD
          
          cat vod_processed.txt >> "$OUTPUT"
          rm -f vod_processed.txt

          # Stats
          TAMIL=$(grep -c '^#EXTINF:.*group-title="Tamil"' "$OUTPUT" 2>/dev/null || echo 0)
          STATIC=$(grep -c '^#EXTINF:' "$OTHER_M3U" 2>/dev/null || echo 0)
          VOD=$(grep -c '^#EXTINF:.*group-title="VOD"' "$OUTPUT" 2>/dev/null || echo 0)
          TOTAL=$((TAMIL + STATIC + VOD))
          
          echo "✅ main.m3u built successfully!"
          echo "   🎯 Live Tamil Channels: $TAMIL"
          echo "   📦 Static Channels: $STATIC"
          echo "   🎬 VOD Channels: $VOD"
          echo "   📊 Total Channels: $TOTAL"
          
          echo "tamil=$TAMIL" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "vod=${{ steps.download_vod.outputs.vod_count }}" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Commit main.m3u
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.m3u
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git commit -m "📺 main.m3u: ${{ steps.build_main.outputs.tamil }} Live Tamil + ${{ steps.build_main.outputs.static }} Static + ${{ steps.build_main.outputs.vod }} VOD | $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
