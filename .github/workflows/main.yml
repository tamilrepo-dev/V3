name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify other.m3u exists
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          if [ ! -f "$OTHER_M3U" ]; then
            echo "❌ $OTHER_M3U not found — aborting"
            exit 1
          fi
          echo "✅ $OTHER_M3U located."

      - name: Normalize other.m3u
        run: |
          OTHER_M3U=".github/workflows/other.m3u"
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' "$OTHER_M3U"
          dos2unix "$OTHER_M3U" 2>/dev/null || sed -i 's/\r$//' "$OTHER_M3U"
          sed -i 's/[ \t]*$//' "$OTHER_M3U"

      - name: Download and normalize vod.m3u
        id: download_vod
        run: |
          VOD_URL="https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u"
          VOD_FILE="vod_temp.m3u"
          
          echo "📥 Fetching VOD playlist from $VOD_URL"
          for i in {1..3}; do
            if curl -sfL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
              -o "$VOD_FILE" "$VOD_URL"; then
              echo "✅ Download succeeded on attempt $i"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 2s..."
              sleep 2
            fi
            if [ $i -eq 3 ]; then
              echo "❌ All 3 attempts failed to download vod.m3u"
              exit 1
            fi
          done

          if [ ! -s "$VOD_FILE" ]; then
            echo "❌ vod.m3u is empty — aborting"
            exit 1
          fi

          # Normalize
          sed -i '1s/^\xEF\xBB\xBF//' "$VOD_FILE"
          dos2unix "$VOD_FILE" 2>/dev/null || sed -i 's/\r$//' "$VOD_FILE"
          sed -i 's/[ \t]*$//' "$VOD_FILE"

          COUNT=$(grep -c '^#EXTINF:' "$VOD_FILE" 2>/dev/null || echo 0)
          echo "✅ vod.m3u loaded — $COUNT channel(s)"
          echo "vod_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build main.m3u (Live Tamil M3U + other.m3u + VOD)
        id: build_main
        run: |
          OUTPUT="main.m3u"
          OTHER_M3U=".github/workflows/other.m3u"
          VOD_FILE="vod_temp.m3u"

          # 1️⃣ Header
          echo "#EXTM3U x-tvg-url=\"https://iptv-org.github.io/epg/guides/tamil.xml\"" > "$OUTPUT"

          # 2️⃣ Fetch & inject live Tamil channels from M3U
          echo "# === LIVE TAMIL (M3U) ===" >> "$OUTPUT"

          M3U_URL="https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u"

          echo "📡 Fetching live channel M3U from $M3U_URL"
          M3U_RAW=""
          for i in {1..3}; do
            M3U_RAW=$(curl -sfL --max-time 25 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
              -H "Accept: audio/x-mpegurl, application/vnd.apple.mpegurl, */*" \
              "$M3U_URL" 2>/dev/null) && break
            echo "⚠️ Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ -z "$M3U_RAW" ]; then
            echo "❌ All retries failed — no response from $M3U_URL"
            exit 1
          fi

          # Check for HTML error
          if [[ "${M3U_RAW:0:1}" == "<" ]]; then
            echo "❌ Received HTML instead of M3U. First 300 chars:"
            echo "$M3U_RAW" | head -c 300
            echo
            exit 1
          fi

          # Save temp file for processing
          TEMP_M3U="temp_live.m3u"
          echo "$M3U_RAW" > "$TEMP_M3U"

          # First, show all available channel names for debugging
          echo "📋 Available channels in M3U:"
          awk '
            /^#EXTINF:/ {
              line = $0
              # Try to extract channel name
              if (match(line, /,([^,]+)$/)) {
                name = substr(line, RSTART+1)
              } else if (match(line, /tvg-name="([^"]+)"/, arr)) {
                name = arr[1]
              } else if (match(line, /group-title="([^"]+)"/, arr)) {
                name = arr[1]
              } else {
                name = "UNKNOWN"
              }
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              if (name != "" && name != "UNKNOWN") {
                print "  - " name
              }
            }
          ' "$TEMP_M3U" | sort -u | head -50
          echo ""

          # Define target channels - EXACT match list (no loose patterns)
          declare -A TARGET_CHANNELS=(
            ["Sun TV HD"]="sun tv hd"
            ["Sun Music HD"]="sun music hd"
            ["Sun Life"]="sun life"
            ["Adithya TV"]="adithya tv"
            ["KTV HD"]="ktv hd"
            ["Star Vijay HD"]="star vijay hd"
            ["Vijay Super HD"]="vijay super hd"
            ["Colors Tamil"]="colors tamil"
            ["Jaya TV HD"]="jaya tv hd"
            ["Jaya Plus"]="jaya plus"
            ["Jaya Max"]="jaya max"
            ["J Movies"]="j movies"
            ["Polimer TV"]="polimer tv"
            ["Vasanth TV"]="vasanth tv"
            ["Kalaignar TV"]="kalaignar tv"
            ["Raj TV"]="raj tv"
            ["Disney Channel"]="disney channel"
            ["Disney Junior"]="disney junior"
            ["Hungama"]="hungama"
            ["Super Hungama"]="super hungama"
            ["Sonic Tamil"]="sonic tamil"
            ["Nick Tamil"]="nick tamil"
            ["Nickelodeon Jr."]="nickelodeon jr"
            ["Pogo"]="pogo"
            ["Cartoon Network"]="cartoon network"
            ["CN HD+ Tamil"]="cn hd+ tamil"
            ["Discovery Kids Tamil"]="discovery kids tamil"
            ["D Tamil"]="d tamil"
            ["History HD"]="history hd"
          )

          # Process M3U with EXACT matching and preserve logos
          python3 << 'PYTHON_SCRIPT'
          import re
          import sys

          # Read the temp M3U file
          with open('temp_live.m3u', 'r', encoding='utf-8', errors='ignore') as f:
              content = f.read()

          # Split into lines
          lines = content.split('\n')
          
          # Target channels with exact match patterns (case insensitive)
          target_patterns = {
              "Sun TV HD": r'(?i)^sun tv hd$',
              "Sun Music HD": r'(?i)^sun music hd$',
              "Sun Life": r'(?i)^sun life$',
              "Adithya TV": r'(?i)^adithya tv$',
              "KTV HD": r'(?i)^ktv hd$',
              "Star Vijay HD": r'(?i)^star vijay hd$',
              "Vijay Super HD": r'(?i)^vijay super hd$',
              "Colors Tamil": r'(?i)^colors tamil$',
              "Jaya TV HD": r'(?i)^jaya tv hd$',
              "Jaya Plus": r'(?i)^jaya plus$',
              "Jaya Max": r'(?i)^jaya max$',
              "J Movies": r'(?i)^j movies$',
              "Polimer TV": r'(?i)^polimer tv$',
              "Vasanth TV": r'(?i)^vasanth tv$',
              "Kalaignar TV": r'(?i)^kalaignar tv$',
              "Raj TV": r'(?i)^raj tv$',
              "Disney Channel": r'(?i)^disney channel$',
              "Disney Junior": r'(?i)^disney junior$',
              "Hungama": r'(?i)^hungama$',
              "Super Hungama": r'(?i)^super hungama$',
              "Sonic Tamil": r'(?i)^sonic tamil$',
              "Nick Tamil": r'(?i)^nick tamil$',
              "Nickelodeon Jr.": r'(?i)^nickelodeon jr$',
              "Pogo": r'(?i)^pogo$',
              "Cartoon Network": r'(?i)^cartoon network$',
              "CN HD+ Tamil": r'(?i)^cn hd\+ tamil$',
              "Discovery Kids Tamil": r'(?i)^discovery kids tamil$',
              "D Tamil": r'(?i)^d tamil$',
              "History HD": r'(?i)^history hd$'
          }

          matched_channels = []
          i = 0
          
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith('#EXTINF:'):
                  # Extract channel name from the line
                  # Look for pattern: ,ChannelName at the end
                  match = re.search(r',([^,]+)$', line)
                  if match:
                      channel_name = match.group(1).strip()
                      
                      # Check if this channel matches any target (exact match)
                      matched_display = None
                      for display_name, pattern in target_patterns.items():
                          if re.match(pattern, channel_name, re.IGNORECASE):
                              matched_display = display_name
                              break
                      
                      if matched_display and i + 1 < len(lines):
                          url_line = lines[i + 1].strip()
                          if url_line.startswith(('http://', 'https://', 'rtmp://')):
                              # Extract existing logo if present
                              logo_match = re.search(r'tvg-logo="([^"]*)"', line)
                              tvg_logo = logo_match.group(1) if logo_match else ""
                              
                              # Rebuild EXTINF line with proper attributes
                              # Preserve original tvg-id, tvg-name, tvg-logo
                              tvg_id_match = re.search(r'tvg-id="([^"]*)"', line)
                              tvg_name_match = re.search(r'tvg-name="([^"]*)"', line)
                              
                              tvg_id = tvg_id_match.group(1) if tvg_id_match else ""
                              tvg_name = tvg_name_match.group(1) if tvg_name_match else matched_display
                              
                              # Build new EXTINF line
                              new_extinf = f'#EXTINF:-1'
                              if tvg_id:
                                  new_extinf += f' tvg-id="{tvg_id}"'
                              if tvg_name:
                                  new_extinf += f' tvg-name="{tvg_name}"'
                              if tvg_logo:
                                  new_extinf += f' tvg-logo="{tvg_logo}"'
                              new_extinf += f' group-title="Tamil",{matched_display}'
                              
                              matched_channels.append((new_extinf, url_line))
                              print(f"✅ Matched: {channel_name} -> {matched_display}", file=sys.stderr)
                  i += 2
              else:
                  i += 1

          # Write matched channels to output
          with open('matched_channels.txt', 'w', encoding='utf-8') as f:
              for extinf, url in matched_channels:
                  f.write(extinf + '\n')
                  f.write(url + '\n')
          
          print(f"COUNT:{len(matched_channels)}", file=sys.stderr)
          PYTHON_SCRIPT

          # Append matched channels to main.m3u
          if [ -f matched_channels.txt ]; then
            cat matched_channels.txt >> "$OUTPUT"
            LIVE_COUNT=$(grep -c '^#EXTINF:' matched_channels.txt 2>/dev/null || echo 0)
            echo "✅ Matched $LIVE_COUNT channels"
            rm -f matched_channels.txt
          else
            LIVE_COUNT=0
            echo "⚠️ No channels matched"
          fi

          rm -f "$TEMP_M3U"

          # 3️⃣ Append static channels (preserve their original logos)
          echo "" >> "$OUTPUT"
          echo "# === STATIC CHANNELS (from .github/workflows/other.m3u) ===" >> "$OUTPUT"
          cat "$OTHER_M3U" | grep -v '^#EXTM3U' >> "$OUTPUT"

          # 4️⃣ Append VOD (preserve existing logos)
          echo "" >> "$OUTPUT"
          echo "# === VOD (from tamilrepo-dev/VOD) ===" >> "$OUTPUT"
          python3 << 'PYTHON_VOD'
          import re
          
          with open('vod_temp.m3u', 'r', encoding='utf-8', errors='ignore') as f:
              lines = f.readlines()
          
          output_lines = []
          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith('#EXTINF:'):
                  # Preserve all original attributes including logo
                  if 'group-title=' not in line:
                      # Add group-title="VOD" while preserving everything else
                      if '#EXTINF:-1 ' in line:
                          line = line.replace('#EXTINF:-1 ', '#EXTINF:-1 group-title="VOD" ')
                      elif '#EXTINF:-1,' in line:
                          line = line.replace('#EXTINF:-1,', '#EXTINF:-1 group-title="VOD",')
                      else:
                          line = line.replace('#EXTINF:', '#EXTINF: group-title="VOD" ')
                  else:
                      # Replace existing group-title with VOD
                      line = re.sub(r'group-title="[^"]*"', 'group-title="VOD"', line)
                  
                  output_lines.append(line + '\n')
                  if i + 1 < len(lines):
                      output_lines.append(lines[i + 1])
                  i += 2
              else:
                  if line and not line.startswith('#EXTM3U'):
                      output_lines.append(line + '\n')
                  i += 1
          
          with open('vod_processed.txt', 'w', encoding='utf-8') as f:
              f.writelines(output_lines)
          PYTHON_VOD
          
          cat vod_processed.txt >> "$OUTPUT"
          rm -f vod_processed.txt

          # 5️⃣ Stats
          TAMIL=$(grep -c '^#EXTINF:.*group-title="Tamil"' "$OUTPUT" 2>/dev/null || echo 0)
          STATIC=$(grep -c '^#EXTINF:' "$OTHER_M3U" 2>/dev/null || echo 0)
          VOD=$(grep -c '^#EXTINF:.*group-title="VOD"' "$OUTPUT" 2>/dev/null || echo 0)
          TOTAL=$((TAMIL + STATIC + VOD))
          echo "✅ main.m3u built with $TOTAL channels:"
          echo "   🎯 Live Tamil (M3U): $TAMIL matched out of 29 target channels"
          echo "   📦 Static (other.m3u): $STATIC"
          echo "   🎬 VOD (tamilrepo-dev): $VOD"
          echo "tamil=$TAMIL" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "vod=${{ steps.download_vod.outputs.vod_count }}" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Commit main.m3u
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi
          git commit -m "📺 main.m3u: ${{ steps.build_main.outputs.tamil }} Live Tamil + ${{ steps.build_main.outputs.static }} Static + ${{ steps.build_main.outputs.vod }} VOD | $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
